name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 配置 Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: 安装锁定依赖
        run: npm ci

      - name: 运行完整检查
        run: npm run check
